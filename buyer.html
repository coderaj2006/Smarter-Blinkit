<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buyer Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar">
  <div class="nav-left">
      <h2>Smarter Blinkit</h2>
  </div>

  <div class="nav-right">
      <button onclick="window.location.href='cart.html'">
          🛒 Cart
      </button>
  </div>
</header>
<div class="assistant-box">

<input 
id="searchInput"
placeholder="Ask the AI assistant (e.g. I have a cold)"
>
<div id="assistantResponse"></div>
<button onclick="searchProducts()">Ask</button>

</div>
<div class="container">
    <h2>Buyer Dashboard</h2>

    <div class="cart-info">
    <a href="cart.html" style="text-decoration:none; color:black;">
    🛒 Cart: <span id="cartCount">0</span>
</a>
    </div>
    <input type="text" id="searchInput" placeholder="Search items or describe need">
<button onclick="searchProducts()">Search</button>
<p style="font-size: 12px; color: gray;">
Try: "cold", "breakfast", "pizza ingredients"
</p>
    <div id="productGrid" class="grid"></div>

    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
</div>

<script src="js/search.js"></script>
</body>
</html>
