<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buyer Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar">
  <div class="nav-left">
      <h2>Smarter Blinkit</h2>
  </div>

  <div class="nav-right">
      <button onclick="window.location.href='cart.html'">
        🛒 <span id="cartCount">0</span>
      </button>
  </div>
</header>
<div class="assistant-box">

<input 
id="searchInput"
placeholder="Ask the AI assistant (e.g. I have a cold)"
>

<button onclick="searchProducts()">Ask</button>

</div>
<div id="assistantResponse"></div>
<div class="container">
    <div class="category-bar">

    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('fruits')">Fruits</button>
    <button onclick="filterCategory('vegetables')">Vegetables</button>
    <button onclick="filterCategory('dairy')">Dairy</button>
    <button onclick="filterCategory('bakery')">Bakery</button>

</div>
    <h2>Buyer Dashboard</h2>

    <div class="cart-info">
    <a href="cart.html" style="text-decoration:none; color:black;">
    🛒 Cart: <span id="cartCountDashboard">0</span>
</a>
    </div>
    
    <div id="productGrid" class="grid"></div>

    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
</div>


</body>
</html>
